<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>กำลังตรวจสอบสิทธิ์...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #1A4789; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); width: 90%; max-width: 400px; text-align: center; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #F0C020; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .logo { width: 140px; height: auto; margin: 0 auto 16px; display: block; object-fit: contain; }
  </style>
</head>
<body>

  <div class="card" id="loading-section">
    <div class="loader" id="loading-spinner"></div>
    <p id="status-text" style="color: #333; font-weight: 600; font-size: 16px;">กำลังตรวจสอบข้อมูล...</p>
  </div>

  <div class="card" id="desktop-section" style="display: none;">
    <img src="https://educationresourcesawards.co.uk/site-editor/wp-content/uploads/2022/01/Logo_Head_of_ideas_standard_underneath_RGB.-768x962.png" class="logo" alt="Logo">
    <h1 style="color:#1A4789; font-size:20px; margin-bottom: 10px;">กรุณาเปิดลิงก์ ผ่าน LINE เท่านั้น</h1>
  </div>

<script>
  const LIFF_ID = '2009932975-mnW1hGnV';

  // 🔍 สร้างตัวแปรจำสถานะแอดมินไว้ (เพื่อกัน LINE ทำลิงก์เพี้ยน)
  let isAdminGlobal = false;

  window.onload = function() {
    // 💡 คาถาแก้บั๊ก LINE: สแกนหาคำว่า admin ทั้งใน URL ปกติและแบบที่ LINE ซ่อนไว้
    const currentUrl = window.location.href;
    if (currentUrl.includes('page=admin') || currentUrl.includes('page%3Dadmin')) {
        isAdminGlobal = true;
    }

    var isDesktop = !(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent));
    
    // 🔒 ถ้าเป็นคอม "และ" ไม่ใช่แอดมิน ให้บล็อกทันที
    if (isDesktop && !isAdminGlobal) {
      document.getElementById('loading-section').style.display = 'none';
      document.getElementById('desktop-section').style.display = 'block';
      return; 
    }
    
    // 📱 รันระบบต่อ
    initLiff();
  };

  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
      
      if (!liff.isLoggedIn()) {
        const currentUrl = window.location.href; 
        liff.login({ redirectUri: currentUrl });
        return;
      }
      
      const profile = await liff.getProfile();
      const response = await fetch('config.json?t=' + new Date().getTime());
      const config = await response.json();
      const latestGasUrl = config.gas_url;

      if (latestGasUrl) {
        // 🚀 ส่งไป Google Script โดยใช้ตัวแปรที่จำไว้
        const pageParam = isAdminGlobal ? 'admin' : 'index';
        
        const targetUrl = latestGasUrl + "?uid=" + profile.userId + "&dname=" + encodeURIComponent(profile.displayName) + "&page=" + pageParam;
        
        document.getElementById('status-text').innerText = "กำลังพาท่านเข้าสู่ระบบ...";
        window.location.href = targetUrl;
      } else {
        document.getElementById('status-text').innerText = "ไม่พบลิงก์ปลายทางในระบบ";
        document.getElementById('status-text').style.color = "#d32f2f";
        document.getElementById('loading-spinner').style.display = "none";
      }

    } catch (e) {
      console.error("Redirect Error:", e);
      document.getElementById('status-text').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
      document.getElementById('status-text').style.color = "#d32f2f";
      document.getElementById('loading-spinner').style.display = "none";
    }
  }
</script>
</body>
</html>
