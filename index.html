<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
    <p>กำลังเชื่อมต่อระบบรักษาความปลอดภัย...</p>
  </div>

<script>
  const LIFF_ID = '2009932975-mnW1hGnV';

  async function initLiff() {
    try {
      // 1. ดึงไอดีจริงจาก LINE
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      const profile = await liff.getProfile();

      // 2. 🚀 ดึง URL ล่าสุดจากไฟล์ config.json (เหมือนดึงตัวแปรกลาง)
      const response = await fetch('./config.json');
      const config = await response.json();
      const latestGasUrl = config.gas_url;

      // 3. วาร์ปไปที่ GAS พร้อมส่งไอดีจริงไปด้วย
      if (latestGasUrl) {
        window.location.replace(latestGasUrl + "?uid=" + profile.userId);
      } else {
        alert("ไม่พบลิงก์ปลายทางใน config.json");
      }

    } catch (e) {
      console.error("Redirect Error:", e);
    }
  }
  window.onload = initLiff;
</script>
</body>
</html>
