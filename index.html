<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
    <p>กำลังเชื่อมต่อระบบรักษาความปลอดภัย...</p>
  </div>

  <script>
    // 🚩 ใส่ลิงก์หน้าเว็บ Google Apps Script ตัวเดิมของพี่ที่นี่ครับ
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz53T8nBbcjgVRKwY90Mp61Wu99TZ5IkUir7ONQK4Zexf2ks25_iUK9hh7CRsgLEukSSA/exec';
    const LIFF_ID = '2009932975-mnW1hGnV';

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          // 🚀 วาร์ปกลับไปหาหน้าเว็บเดิมใน GAS พร้อม "แนบไอดีจริง" ไปใน URL
          window.location.href = GAS_URL + "?uid=" + profile.userId;
        }
      } catch (e) {
        console.error(e);
        // ถ้าพัง ให้กลับไปหน้าเดิมแบบไม่มีไอดี (เป็น web)
        window.location.href = GAS_URL;
      }
    }
    window.onload = initLiff;
  </script>
</body>
</html>
